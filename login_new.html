<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a0f0f;
            --primary-dark: #2a0707;
            --primary-light: #6a1f1f;
            --secondary-color: #000000;
            --accent-color: #1f0505;
            --text-light: #f8fafc;
            --text-dark: #1f2937;
            --bg-dark: #000000;
            --bg-darker: #0a0a0a;
            --bg-light: #f9fafb;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #000000, #3d0a0a, #6b1a1a, #000000, #3d0a0a);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            min-height: 100vh;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(220, 38, 38, 0.1);
            border-bottom: 1px solid rgba(220, 38, 38, 0.2);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
            font-size: 1.5rem;
        }

        .user-info {
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: 20px;
            font-weight: 500;
        }

        .user-info i {
            color: var(--primary-color);
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(220, 38, 38, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-title {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: rgba(248, 250, 252, 0.8);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: var(--text-light);
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2);
        }

        .login-btn {
            width: 100%;
            background: var(--primary-color);
            color: var(--text-light);
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 38, 38, 0.3);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(220, 38, 38, 0.3);
        }

        .divider-text {
            background: rgba(0, 0, 0, 0.8);
            padding: 0 15px;
            color: rgba(248, 250, 252, 0.7);
            font-size: 0.9rem;
        }

        .register-link {
            text-align: center;
        }

        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(248, 250, 252, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover {
            color: var(--text-light);
        }

        @media (max-width: 480px) {
            .main-container { padding: 10px; }
            .login-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index_new.html">
                <i class="fas fa-chart-line me-2"></i>FinSight
            </a>
            <div class="navbar-nav ms-auto">
                <div class="user-info">
                    <i class="fas fa-user me-2"></i>
                    <span id="userDisplay">Not logged in</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">
                    <i class="fas fa-sign-in-alt me-2"></i>Welcome Back
                </h1>
                <p class="login-subtitle">Sign in to access your AI stock analysis dashboard</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username or Email</label>
                    <input type="text" class="form-input" id="username" placeholder="Enter your username or email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <div class="divider">
                <span class="divider-text">OR</span>
            </div>

            <div class="register-link">
                <a href="register.html">Create New Account</a>
            </div>

            <div class="back-link">
                <a href="index_new.html">
                    <i class="fas fa-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialize username display for login page
        document.addEventListener('DOMContentLoaded', function() {
            const usernameElement = document.getElementById('userDisplay');
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            
            if (isLoggedIn === 'true') {
                const username = localStorage.getItem('username') || 'User';
                usernameElement.textContent = `Welcome ${username}`;
            } else {
                usernameElement.textContent = 'Not logged in';
            }
        });

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Please enter both username and password');
                return;
            }

            // Simulate login process
            const loginBtn = event.target.querySelector('.login-btn');
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
            loginBtn.disabled = true;

            setTimeout(() => {
                // Store login state (in real app, this would be server-side)
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                
                // Update the username display before redirecting
                document.getElementById('userDisplay').textContent = `Welcome ${username}`;
                
                alert('Login successful!');
                window.location.href = 'dashboard_new.html';
            }, 2000);
        }
    </script>
</body>
</html>
